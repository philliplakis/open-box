name: Build OpenBox Image

on:
  push:
    branches: [main]
    paths:
      - sandbox/Dockerfile
      - .github/workflows/openbox-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: sandbox
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/philliplakis/open-box:latest
            ghcr.io/philliplakis/open-box:${{ github.sha }}
